name: build

# Build-only CI. No secrets, no deploy, no publishing — this workflow only
# verifies that the open core compiles on macOS.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: swift build (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build vocateca-cli
        run: swift build --product vocateca-cli

      - name: Build core libraries
        run: swift build --product VocatecaCore
