name: build

# Build-only CI. No secrets, no deploy, no publishing — this workflow only
# verifies that the open core compiles on macOS.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: swift build (macOS)
    # macOS 26 / Xcode 26 ships Swift 6.3, which the dependency graph requires:
    # the Qwen3-ASR engine (soniqo/speech-swift) pulls in mlx-swift 0.31.x, whose
    # Package.swift declares swift-tools-version 6.3. The default macos-15 image
    # only has Swift 6.1 and fails at dependency resolution before compiling.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build vocateca-cli
        run: swift build --product vocateca-cli

      - name: Build core libraries
        run: swift build --product VocatecaCore
