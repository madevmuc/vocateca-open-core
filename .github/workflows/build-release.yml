name: build-release

on:
  push:
    tags: ['v*']

# softprops/action-gh-release needs contents:write to generate release
# notes via the GitHub API. Without this the workflow errors with
# "Resource not accessible by integration" on the notes endpoint.
permissions:
  contents: write

# Opt every JS action in this workflow into the Node 24 runtime.
# GitHub silently forces it starting June 2026, but we bypass the
# deprecation warning now. Required because softprops/action-gh-release
# still declares runs.using=node20 in its action.yml.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt py2app

      - name: Build standalone .app
        run: .venv/bin/python setup-full.py py2app

      - name: Build DMG
        run: ./scripts/build-dmg.sh "${GITHUB_REF_NAME#v}"

      - name: Upload release artefact
        uses: actions/upload-artifact@v5
        with:
          name: Paragraphos-dmg-${{ github.ref_name }}
          path: dist/*.dmg

      # Curated highlights lead the release body (project rule: never ship
      # only the auto-generated full commit list). awk prints from the
      # first `## ` heading up to (not including) the next `## ` — i.e.
      # exactly the newest CHANGELOG section, which is the tag being built.
      - name: Extract changelog section for release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          awk '/^## /{c++} c==1' CHANGELOG.md > RELEASE_NOTES.md
          test -s RELEASE_NOTES.md || { echo "::error::RELEASE_NOTES.md empty — CHANGELOG top section not matched by /^## /"; exit 1; }

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          draft: true
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
